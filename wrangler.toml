name = "businesslog-ai"
main = "src/worker.ts"
compatibility_date = "2024-05-29"

[vars]
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "MEMORY"
id = "YOUR_KV_NAMESPACE_ID"

[[kv_namespaces]]
binding = "ANALYTICS_KV"
id = "YOUR_ANALYTICS_KV_ID"

[[d1_databases]]
binding = "DB"
database_name = "businesslog-db"
database_id = "YOUR_D1_DATABASE_ID"

[env.production]
name = "businesslog-ai"
routes = [
  { pattern = "businesslog.ai/*", zone_name = "businesslog.ai" }
]
